  #   workMode=HumidifierModes.MANUAL.value="manual", waterLacksState=0, waterTankLifted=0,
  #   autoStopSwitch=0, autoStopState=0, screenSwitch=1, screenState=1, scheduleCount=0,
  #   timerRemain=0, errorCode=0, autoPreference=1, childLockSwitch=0, filterLifePercent=85,
  #   temperature=700 (70.0°F × 10), dryingMode.dryingState=0 (DryingModes.DONE), dryingRemain=7200
  device_on_manual_canonical:
    powerSwitch: 1
    workMode: manual
    humidity: 50
    targetHumidity: 60
    virtualLevel: 3
    mistLevel: 3
    waterLacksState: 0
    waterTankLifted: 0
    autoStopSwitch: 0
    autoStopState: 0
    screenSwitch: 1
    screenState: 1
    scheduleCount: 0
    timerRemain: 0
    errorCode: 0
    dryingMode:
      dryingLevel: 1
      autoDryingSwitch: 1
      dryingState: 0
      dryingRemain: 7200
    autoPreference: 1
    childLockSwitch: 0
    filterLifePercent: 85
    temperature: 700

