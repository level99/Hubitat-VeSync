# pyvesync canonical API fixtures for Sprout Air Purifier (LAP-B851S-* / LAP-BAY-MAX01S series)
# Source: https://github.com/webdjoe/pyvesync
# Commit: c98729c45860cc765d63d49a9a02bbc18de090c4 (2026-04-16)
# Retrieved: 2026-04-28
#
# Model codes (all route to Levoit Sprout Air Purifier driver):
#   LAP-B851S-WUS   -- US standard
#   LAP-B851S-WNA   -- US North America variant
#   LAP-B851S-WEU   -- EU standard
#   LAP-B851S-AEUR  -- EU variant
#   LAP-B851S-AUS   -- Australia
#   LAP-BAY-MAX01S  -- Bay variant
#
# Device class: VeSyncAirSprout (inherits VeSyncAirBaseV2 -> VeSyncAirBypass)
# Features: AIR_QUALITY, NIGHTLIGHT (device_map.py PurifierMap for B851S)
#
# CRITICAL payload notes vs VeSyncAirBypass (Core line):
#   - Switch: {powerSwitch: int, switchIdx: 0}  (NOT {switch:'on'/'off', id:0})
#   - Mode: {workMode: str} via setPurifierMode ('auto', 'sleep' only as direct modes)
#     manual mode is established via setLevel, NOT setPurifierMode {workMode:'manual'}
#     (pyvesync VeSyncAirBaseV2.set_mode: manual -> delegates to set_fan_speed)
#   - Fan speed: setLevel {levelIdx:0, manualSpeedLevel:N, levelType:'wind'}; range 1-3
#     (NOT setLevel {level:N, id:0, type:'wind'} -- that's Core line / VeSyncAirBypass)
#   - Nightlight: setNightLight {night_light: 'on'/'off'/'dim'} (string enum)
#     (VeSyncAirBypass.set_nightlight_mode -- NOT setLightStatus like Sprout Humidifier)
#
# Response fields:
#   powerSwitch (int), workMode (str), fanSpeedLevel (int; 255=off->0),
#   manualSpeedLevel (int), childLockSwitch (int), AQLevel (int 1-4),
#   PM25 (int µg/m³), PM1, PM10, AQI (int), screenSwitch, screenState,
#   humidity (int, optional), temperature (int; F*10 -> div 10, optional),
#   VOC (int, optional), CO2 (int, optional),
#   nightlight: {nightLightSwitch: bool, brightness: int}  -- nested (PurifierNightlight)
#
# Note: PurifierNightlight.nightLightSwitch is bool (not int) in pyvesync model

requests:
  turn_on:
    payload:
      data:
        powerSwitch: 1
        switchIdx: 0
      method: setSwitch
      source: APP

  turn_off:
    payload:
      data:
        powerSwitch: 0
        switchIdx: 0
      method: setSwitch
      source: APP

  # NOTE: workMode wire values are lowercase strings (PurifierModes constants)
  set_auto_mode:
    payload:
      data:
        workMode: auto
      method: setPurifierMode
      source: APP

  set_sleep_mode:
    payload:
      data:
        workMode: sleep
      method: setPurifierMode
      source: APP

  # NOTE: manual mode is established via setLevel (fan speed), NOT setPurifierMode
  # Sending setPurifierMode {workMode:'manual'} returns inner code -1
  set_manual_mode_via_level:
    payload:
      data:
        levelIdx: 0
        manualSpeedLevel: 1
        levelType: wind
      method: setLevel
      source: APP

  # Fan speed: setLevel with manualSpeedLevel (NOT 'level' -- Core line uses 'level')
  # Range 1-3 (fan_levels=[1,2,3] per device_map.py)
  set_fan_speed:
    payload:
      data:
        levelIdx: 0
        manualSpeedLevel: 2
        levelType: wind
      method: setLevel
      source: APP

  turn_on_display:
    payload:
      data:
        screenSwitch: 1
      method: setDisplay
      source: APP

  turn_off_display:
    payload:
      data:
        screenSwitch: 0
      method: setDisplay
      source: APP

  turn_on_child_lock:
    payload:
      data:
        childLockSwitch: 1
      method: setChildLock
      source: APP

  turn_off_child_lock:
    payload:
      data:
        childLockSwitch: 0
      method: setChildLock
      source: APP

  # Nightlight: string enum via setNightLight (NOT setLightStatus -- that's humidifier)
  # Valid values: 'on', 'off', 'dim' (NightlightModes enum)
  set_nightlight_on:
    payload:
      data:
        night_light: "on"
      method: setNightLight
      source: APP

  set_nightlight_dim:
    payload:
      data:
        night_light: "dim"
      method: setNightLight
      source: APP

  set_nightlight_off:
    payload:
      data:
        night_light: "off"
      method: setNightLight
      source: APP

  update:
    payload:
      data: {}
      method: getPurifierStatus
      source: APP

responses:
  # Canonical: device on, auto mode, fan=0 (auto manages speed), good air quality
  device_on_auto_canonical:
    powerSwitch: 1
    workMode: auto
    fanSpeedLevel: 1
    manualSpeedLevel: 1
    childLockSwitch: 0
    AQLevel: 1
    PM25: 5
    PM1: 3
    PM10: 8
    AQI: 95
    screenSwitch: 1
    screenState: 1
    humidity: 48
    temperature: 720
    VOC: 10
    CO2: 450
    nightlight:
      nightLightSwitch: false
      brightness: 0

  # Manual mode, fan speed 2
  device_on_manual_speed2:
    powerSwitch: 1
    workMode: manual
    fanSpeedLevel: 2
    manualSpeedLevel: 2
    childLockSwitch: 0
    AQLevel: 2
    PM25: 15
    PM1: 10
    PM10: 20
    AQI: 72
    screenSwitch: 1
    screenState: 1
    humidity: 45
    temperature: 715
    VOC: 25
    CO2: 500
    nightlight:
      nightLightSwitch: false
      brightness: 0

  # Sleep mode
  device_on_sleep_mode:
    powerSwitch: 1
    workMode: sleep
    fanSpeedLevel: 1
    manualSpeedLevel: 1
    childLockSwitch: 0
    AQLevel: 1
    PM25: 3
    PM1: 2
    PM10: 5
    AQI: 98
    screenSwitch: 0
    screenState: 0
    humidity: 50
    temperature: 710
    VOC: 5
    CO2: 430
    nightlight:
      nightLightSwitch: true
      brightness: 30

  # Device off -- fanSpeedLevel=255 (API retains last-set; driver maps to 0)
  device_off:
    powerSwitch: 0
    workMode: manual
    fanSpeedLevel: 255
    manualSpeedLevel: 2
    childLockSwitch: 0
    AQLevel: 1
    PM25: 4
    PM1: 2
    PM10: 6
    AQI: 96
    screenSwitch: 0
    screenState: 0
    humidity: 50
    temperature: 708
    nightlight:
      nightLightSwitch: false
      brightness: 0

  # Poor air quality (AQLevel 4 = very poor)
  device_on_poor_aq:
    powerSwitch: 1
    workMode: auto
    fanSpeedLevel: 3
    manualSpeedLevel: 3
    childLockSwitch: 0
    AQLevel: 4
    PM25: 85
    PM1: 60
    PM10: 120
    AQI: 20
    screenSwitch: 1
    screenState: 1
    humidity: 42
    temperature: 718
    VOC: 180
    CO2: 900
    nightlight:
      nightLightSwitch: false
      brightness: 0

  # Nightlight on (brightness read-back)
  device_nightlight_on:
    powerSwitch: 1
    workMode: auto
    fanSpeedLevel: 1
    manualSpeedLevel: 1
    childLockSwitch: 0
    AQLevel: 1
    PM25: 5
    PM1: 3
    PM10: 7
    AQI: 94
    screenSwitch: 1
    screenState: 1
    humidity: 47
    temperature: 720
    nightlight:
      nightLightSwitch: true
      brightness: 60

  # Child lock on
  device_child_lock_on:
    powerSwitch: 1
    workMode: manual
    fanSpeedLevel: 2
    manualSpeedLevel: 2
    childLockSwitch: 1
    AQLevel: 2
    PM25: 12
    PM1: 8
    PM10: 15
    AQI: 78
    screenSwitch: 1
    screenState: 1
    humidity: 46
    temperature: 716
    nightlight:
      nightLightSwitch: false
      brightness: 0
