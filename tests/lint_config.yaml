  # -- Tier-3: EverestAir / SproutAir setMode + setFanSpeed --
  # Deferred: API behavior while device is off is unconfirmed (live-capture
  # needed before classifying setMode as SHOULD-ON vs SKIP-OK). setFanSpeed
  # is more clearly SHOULD-ON but bundled with setMode for same-diff coherence.

  - rule_id: "RULE32_auto_on_guard_missing"
    file: "Drivers/Levoit/LevoitEverestAir.groovy"
    reason: >
      Layer-5 scaffold exemption: BP24-B on setMode() line 206 and setFanSpeed()
      line 234. setFanSpeed is SHOULD-ON. setMode classification is deferred
      pending live-capture: EverestAir uses V2 API (VeSyncAirBaseV2 class),
      and if the V2 API rejects mode changes while off (same behaviour as Vital
      line setMode), then setMode is SKIP-OK rather than SHOULD-ON. Remove this
      entry when Tier-3 live-capture confirms the mode classification and the
      BP24-B fix lands on EverestAir.

  - rule_id: "RULE32_auto_on_guard_missing"
    file: "Drivers/Levoit/LevoitSproutAir.groovy"
    reason: >
      Layer-5 scaffold exemption: BP24-B on setMode() line 188 and setFanSpeed()
      line 212. setFanSpeed is SHOULD-ON. setMode classification deferred
      pending live-capture (same V2-API concern as EverestAir). Remove this
      entry when Tier-3 live-capture confirms the mode classification and the
      BP24-B fix lands on SproutAir.
