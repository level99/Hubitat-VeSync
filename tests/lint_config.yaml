# lint_config.yaml — static linter configuration for level99/Hubitat-VeSync
#
# This file configures the structural lint rules. Edit it when:
#   - A driver file is renamed (update frozen_driver_names — but see Bug Pattern #9 first)
#   - A new driver is added (add to frozen_driver_names after it ships and has a stable name)
#   - PII allow-patterns need updating (e.g. a readme example uses a placeholder IP)
#   - A personal domain needs to be added to or removed from the block list
#   - A known design exception needs to be recorded (use exemptions below — never silent)


# ---------------------------------------------------------------------------
# BP9: Frozen driver names
# ---------------------------------------------------------------------------
# Maps filename -> expected metadata name field value.
# The linter checks that definition(name: "...") in each file matches this list.
# NEVER change a name here without reading Bug Pattern #9 first — doing so
# confirms a name change that will orphan existing user installs.
#
# To add a new driver: add its entry here AFTER it ships to main with a stable name.
# Until it ships, the lint config does not know about it (new files with no entry are skipped).

frozen_driver_names:
  VeSyncIntegration.groovy:        "VeSync Integration"
  LevoitCore200S.groovy:           "Levoit Core200S Air Purifier"
  "LevoitCore200S Light.groovy":   "Levoit Core200S Air Purifier Light"
  LevoitCore300S.groovy:           "Levoit Core300S Air Purifier"
  LevoitCore400S.groovy:           "Levoit Core400S Air Purifier"
  LevoitCore600S.groovy:           "Levoit Core600S Air Purifier"
  LevoitVital100S.groovy:          "Levoit Vital 100S Air Purifier"
  LevoitVital200S.groovy:          "Levoit Vital 200S Air Purifier"
  LevoitClassic300S.groovy:        "Levoit Classic 300S Humidifier"
  LevoitSuperior6000S.groovy:      "Levoit Superior 6000S Humidifier"
  LevoitOasisMist450S.groovy:      "Levoit OasisMist 450S Humidifier"
  LevoitLV600S.groovy:             "Levoit LV600S Humidifier"
  LevoitDual200S.groovy:           "Levoit Dual 200S Humidifier"
  LevoitClassic200S.groovy:        "Levoit Classic 200S Humidifier"
  LevoitLV600SHubConnect.groovy:   "Levoit LV600S Hub Connect Humidifier"
  LevoitOasisMist1000S.groovy:     "Levoit OasisMist 1000S Humidifier"
  LevoitSproutHumidifier.groovy:   "Levoit Sprout Humidifier"
  LevoitSproutAir.groovy:          "Levoit Sprout Air Purifier"
  LevoitEverestAir.groovy:         "Levoit EverestAir Air Purifier"
  LevoitTowerFan.groovy:           "Levoit Tower Fan"
  LevoitPedestalFan.groovy:        "Levoit Pedestal Fan"
  LevoitGeneric.groovy:            "Levoit Generic Device"
  "Notification Tile.groovy":      "Notification Tile"
  VeSyncIntegrationVirtual.groovy: "VeSync Virtual Test Parent"


# ---------------------------------------------------------------------------
# Rule 16: PII scan — allow patterns
# ---------------------------------------------------------------------------
# Lines matching any of these regex patterns are exempt from PII findings.
# Use this for documentation that DESCRIBES PII patterns with placeholder values.
# Be conservative: if in doubt, don't add an exemption.

pii_allow_patterns:
  # Readme / docs that describe the API placeholder pattern conceptually
  - "your@email\\.com"
  - "example@example\\.com"
  - "user@example\\.com"
  # The parent driver's sanitize() function contains the regex patterns it redacts —
  # those pattern-strings aren't real PII
  - "sanitize"
  # noreply commit co-author email (in CLAUDE.md / commit messages)
  - "noreply@anthropic\\.com"
  # Fixture source attribution comments (upstream pyvesync maintainer email if present)
  - "SOURCE\\.md"


# ---------------------------------------------------------------------------
# Rule 16: PII scan — blocked personal domains
# ---------------------------------------------------------------------------
# Domains on this list are flagged as personal domain references if found in
# any committed file. Add domains that belong to the maintainer's personal
# network or other private infrastructure.
#
# Format: exact domain or wildcard subdomain prefix (*.example.com matches
# anything.example.com). Case-insensitive.

blocked_domains: []
# Example (add if needed):
#   - "*.wep.net"
#   - "myhub.local"


# ---------------------------------------------------------------------------
# RULE33 — BP25 case-sensitivity per-method exemptions
# ---------------------------------------------------------------------------
# Each entry exempts a specific (file, method) pair from RULE33's C3-gate
# case-sensitivity check. Use for methods where BP25 is known but deferred
# to a separate sweep (e.g. preview drivers without live-capture hardware).
#
# Required fields:
#   file     — repo-root-relative path using forward slashes
#   method   — exact Groovy method name
#   rationale — REQUIRED non-empty explanation

# All previously-deferred sites fixed in the v2.5 class-wide BP25 sweep; no exemptions needed.
bp25_case_sensitivity_exemptions: []


# ---------------------------------------------------------------------------
# RULE37 — BP26 unsafe integer coercion per-method exemptions
# ---------------------------------------------------------------------------
# Each entry exempts a specific (file, method) pair from RULE37's bare
# ``as Integer`` / ``.toInteger()`` detection.  Use only when the coercion is
# provably safe at the call site (e.g. guarded by an isinstance / isInteger()
# precondition that the static rule cannot see).
#
# Required fields:
#   file      — repo-root-relative path using forward slashes
#   method    — exact Groovy method name
#   rationale — REQUIRED non-empty explanation

bp26_unsafe_int_coercion_exemptions:
  - file: "Drivers/Levoit/LevoitPedestalFan.groovy"
    method: "setSpeed"
    rationale: >
      `(spd as Integer)` is enclosed in the precondition
      `if (spd instanceof Number || (spd instanceof String && spd.isInteger()))`.
      The coercion executes only when spd is already confirmed to be a Number or
      an isInteger()-validated String, so NumberFormatException / GroovyCastException
      cannot be thrown.  Routing through safeIntArg would alter the FanControl
      enum-vs-numeric dispatch: safeIntArg("5.7") → 5 → sendLevel(5), whereas the
      current code correctly lets non-isInteger strings (incl. "5.7", "auto", "low")
      fall through to the named-speed enum path below the if-block.  Safe by
      construction; the RULE37 heuristic does not recognize the instanceof+isInteger
      precondition as a safety guard.
      TODO(v2.6+): teach RULE37 to recognise an enclosing
      `instanceof Number || (instanceof String && isInteger())` precondition as a
      safety guard and skip the gated `as Integer`, removing the need for this entry.

  - file: "Drivers/Levoit/LevoitTowerFan.groovy"
    method: "setSpeed"
    rationale: >
      Identical pattern to LevoitPedestalFan.groovy setSpeed — `(spd as Integer)`
      inside `if (spd instanceof Number || (spd instanceof String && spd.isInteger()))`.
      Coercion is safe by construction; safeIntArg would break the numeric-vs-enum
      FanControl dispatch path for decimal strings like "5.7".
      TODO(v2.6+): same precision improvement as LevoitPedestalFan.groovy setSpeed.


# ---------------------------------------------------------------------------
# Rule 16: PII scan — token string allow-list
# ---------------------------------------------------------------------------
# Specific 32-64 char alphanumeric strings that are known-safe (e.g., test
# fixture UUIDs, pyvesync canonical trace IDs). Add carefully.

pii_token_allowlist:
  # pyvesync canonical traceId placeholder used in fixtures
  - "1634265366"


# ---------------------------------------------------------------------------
# RULE32 — BP24 per-method SKIP-OK / NO-ON exemptions
# ---------------------------------------------------------------------------
# Each entry exempts a specific (file, method) pair from RULE32's auto-on
# guard check.  Use this for methods intentionally classified as SKIP-OK
# or NO-ON per the BP24 taxonomy.
#
# Required fields:
#   file     — repo-root-relative path using forward slashes
#   method   — exact Groovy method name (e.g. "setMode")
#   rationale — REQUIRED non-empty explanation; empty string causes rule to skip silently
#
# SKIP-OK: V2 API rejects the command while device is off; on() internally
#   configures the mode, so an external auto-on would race-condition against
#   on()'s own mode init.  Returning false silently when off is acceptable;
#   user follows up with explicit on().
# NO-ON:   The command configures a setting that takes effect on next power-on.
#   Silently powering on would be surprising; no auto-on appropriate.
#
# Note: this list is consulted by tests/lint_rules/bp24_auto_on_guard_missing.py
# directly (not via the standard exemptions mechanism in lint.py).  A method
# listed here must also have the guard ALREADY PRESENT OR ABSENT based on its
# classification — this list only suppresses the RULE32 FAIL finding; it does
# not change whether a guard is required.

# All prior Vital 100S/200S setMode SKIP-OK entries were removed in the v2.9
# BP24 SHOULD-ON mode-setter sweep: pyvesync VeSyncAirBaseV2.set_mode has no
# power gate, so the per-driver skip-when-off was a driver deviation, not an API
# constraint. setMode now lives in the shared lib as SHOULD-ON with an
# ensureSwitchOn() guard; the per-driver-file exemptions are stale no-ops.
bp24_auto_on_exemptions: []


# ---------------------------------------------------------------------------
# Manifest consistency: files excluded from manifest check
# ---------------------------------------------------------------------------
# Filenames (basename only) that intentionally have no manifest entry.

manifest_excluded_files:
  # Notification Tile is a generic-utility virtual driver inherited from
  # upstream thebearmay/hubitat. Users instantiate it manually as a virtual
  # device — HPM "Install" wouldn't give a usable device since the driver
  # alone doesn't auto-create one. Intentional exception, not a packaging gap.
  # See CONTRIBUTING.md "Codebase orientation" for the full rationale.
  - "Notification Tile.groovy"
  # NOTE: LevoitDiagnosticsLib.groovy no longer needs an entry here.
  # manifest_consistency.py now auto-detects library files via is_library_file()
  # (checks for the library() block) and excludes them from the drivers check
  # without requiring a hardcoded config entry.


# ---------------------------------------------------------------------------
# Per-rule exemptions (design exceptions — never silent)
# ---------------------------------------------------------------------------
# Each entry suppresses a specific (rule_id, file) finding in lint output.
# ALL fields are required:
#   rule_id  — the exact rule identifier (e.g. BP1_missing_2arg_update)
#   file     — repo-root-relative path using forward slashes
#   reason   — REQUIRED free-text justification; empty string is an error
#
# Exemptions are NOT a blanket "ignore this file" escape hatch. They apply
# only to the named rule for the named file. Adding one here without a
# substantive reason string will cause lint to exit with an error.
#
# When adding an exemption: document why the design intentionally differs
# from the rule, and what prevents the exception from masking real bugs.

exemptions:
  - rule_id: "BP1_missing_2arg_update"
    file: "Drivers/Levoit/LevoitCore200S Light.groovy"
    reason: >
      Light child intentionally declares only def update(status) (1-arg).
      The parent invokes the night-light child explicitly via
      nightLight.update(status) in LevoitCore200S.groovy's own update()
      method, NOT through the generic 2-arg poll callback path.
      Adding a 2-arg signature would be misleading and would mask the
      intentional design. See LevoitCore200S.groovy update() for the
      explicit dispatch pattern.

  # ---------------------------------------------------------------------------
  # RULE32 — BP24-B/C auto-on guard missing exemptions
  # All prior setMode "pending live-capture / SKIP-OK" exemptions (Tier-1 Fan,
  # Tier-2 humidifier, Tier-3 EverestAir/SproutAir) were resolved in the v2.9
  # BP24 SHOULD-ON mode-setter sweep: pyvesync VeSyncAirBaseV2/humidifier set_mode
  # has no power gate (the V2 API accepts mode changes while off and reports the
  # device ON on success), so every flagged setMode is now SHOULD-ON with an
  # ensureSwitchOn() guard. No RULE32 exemptions remain.
  # ---------------------------------------------------------------------------
