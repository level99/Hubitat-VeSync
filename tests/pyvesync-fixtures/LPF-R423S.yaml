# pyvesync canonical request fixtures — LPF-R423S (Pedestal Fan)
# Source: https://github.com/webdjoe/pyvesync
# Tag: 3.4.2 (commit 01196b9 — 2026-04-16)
# Original path: src/tests/api/vesyncfan/LPF-R423S.yaml
#
# Note: pyvesync fixture filename uses LPF-R423S (number-transposition typo vs real
# device codes LPF-R432S-AEU / LPF-R432S-AUS). Content is correct.

set_fan_speed:
  json_object:
    payload:
      data:
        levelIdx: 0
        levelType: wind
        manualSpeedLevel: 3
      method: setLevel
      source: APP

set_horizontal_oscillation_range:
  json_object:
    payload:
      data:
        actType: default
        horizontalOscillationState: 1
        left: 30
        right: 30
      method: setOscillationStatus
      source: APP

set_vertical_oscillation_range:
  json_object:
    payload:
      data:
        actType: default
        bottom: 30
        top: 30
        verticalOscillationState: 1
      method: setOscillationStatus
      source: APP

turn_off:
  json_object:
    payload:
      data:
        powerSwitch: 0
        switchIdx: 0
      method: setSwitch
      source: APP

turn_off_horizontal_oscillation:
  json_object:
    payload:
      data:
        actType: default
        horizontalOscillationState: 0
      method: setOscillationStatus
      source: APP

turn_off_vertical_oscillation:
  json_object:
    payload:
      data:
        actType: default
        verticalOscillationState: 0
      method: setOscillationStatus
      source: APP

turn_on:
  json_object:
    payload:
      data:
        powerSwitch: 1
        switchIdx: 0
      method: setSwitch
      source: APP

update:
  json_object:
    payload:
      data: {}
      method: getFanStatus
      source: APP
