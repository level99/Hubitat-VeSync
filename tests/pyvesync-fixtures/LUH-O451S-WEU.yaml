# pyvesync canonical request fixtures — LUH-O451S-WEU (OasisMist 450S Humidifier, EU/RGB variant)
# Source: https://github.com/webdjoe/pyvesync
# Tag: 3.4.2 (commit 01196b9 — 2026-04-16)
# Original path: src/tests/api/vesynchumidifier/LUH-O451S-WUS.yaml
# Note: pyvesync has no separate LUH-O451S-WEU fixture upstream; the WEU (EU 4.5L) shares the
#   WUS v1-humidifier command shapes. The RGB-nightlight setLightStatus op (LUH-O451S-WEU only,
#   per pyvesync PR #502) is a driver-side addition supplied via tools/virtual_parent_extensions.json.

set_auto_mode:
  json_object:
    payload:
      data:
        mode: auto
      method: setHumidityMode
      source: APP

set_humidity:
  json_object:
    payload:
      data:
        target_humidity: 50
      method: setTargetHumidity
      source: APP

set_manual_mode:
  json_object:
    payload:
      data:
        mode: manual
      method: setHumidityMode
      source: APP

set_mist_level:
  json_object:
    payload:
      data:
        id: 0
        level: 3
        type: mist
      method: setVirtualLevel
      source: APP

turn_off:
  json_object:
    payload:
      data:
        enabled: false
        id: 0
      method: setSwitch
      source: APP

turn_off_automatic_stop:
  json_object:
    payload:
      data:
        enabled: false
      method: setAutomaticStop
      source: APP

turn_off_display:
  json_object:
    payload:
      data:
        state: false
      method: setDisplay
      source: APP

turn_on:
  json_object:
    payload:
      data:
        enabled: true
        id: 0
      method: setSwitch
      source: APP

turn_on_automatic_stop:
  json_object:
    payload:
      data:
        enabled: true
      method: setAutomaticStop
      source: APP

turn_on_display:
  json_object:
    payload:
      data:
        state: true
      method: setDisplay
      source: APP

update:
  json_object:
    payload:
      data: {}
      method: getHumidifierStatus
      source: APP
