# pyvesync canonical request fixtures — LEH-S601S (Superior 6000S Humidifier)
# Source: https://github.com/webdjoe/pyvesync
# Tag: 3.4.2 (commit 01196b9 — 2026-04-16)
# Original path: src/tests/api/vesynchumidifier/LEH-S601S.yaml

set_auto_mode:
  json_object:
    payload:
      data:
        workMode: autoPro
      method: setHumidityMode
      source: APP

set_humidity:
  json_object:
    payload:
      data:
        targetHumidity: 50
      method: setTargetHumidity
      source: APP

set_manual_mode:
  json_object:
    payload:
      data:
        workMode: manual
      method: setHumidityMode
      source: APP

set_mist_level:
  json_object:
    payload:
      data:
        levelIdx: 0
        levelType: mist
        virtualLevel: 2
      method: setVirtualLevel
      source: APP

turn_off:
  json_object:
    payload:
      data:
        powerSwitch: 0
        switchIdx: 0
      method: setSwitch
      source: APP

turn_off_automatic_stop:
  json_object:
    payload:
      data:
        autoStopSwitch: 0
      method: setAutoStopSwitch
      source: APP

turn_off_display:
  json_object:
    payload:
      data:
        screenSwitch: 0
      method: setDisplay
      source: APP

turn_off_drying_mode:
  json_object:
    payload:
      data:
        autoDryingSwitch: 0
      method: setDryingMode
      source: APP

turn_on:
  json_object:
    payload:
      data:
        powerSwitch: 1
        switchIdx: 0
      method: setSwitch
      source: APP

turn_on_automatic_stop:
  json_object:
    payload:
      data:
        autoStopSwitch: 1
      method: setAutoStopSwitch
      source: APP

turn_on_display:
  json_object:
    payload:
      data:
        screenSwitch: 1
      method: setDisplay
      source: APP

update:
  json_object:
    payload:
      data: {}
      method: getHumidifierStatus
      source: APP
