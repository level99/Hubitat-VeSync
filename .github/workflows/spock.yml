name: Spock

on:
  pull_request:
    paths:
      - 'Drivers/**'
      - 'src/test/**'
      - 'tests/fixtures/**'
      - 'tests/pyvesync-fixtures/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/spock.yml'
  push:
    branches:
      - main
      - master
      - 'release/**'

jobs:
  spock:
    name: Spock harness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Spock harness
        run: ./gradlew test --no-daemon

      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spock-report
          path: build/reports/tests/test/
          retention-days: 7
