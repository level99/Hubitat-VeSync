name: Lint

on:
  pull_request:
    paths:
      - 'Drivers/**'
      - 'tests/**'
      - 'levoitManifest.json'
      - 'README.md'
      - 'CLAUDE.md'
      - 'TODO.md'
      - '.claude/**'
      - '.github/workflows/lint.yml'
  push:
    branches:
      - main
      - master
      - 'release/**'

jobs:
  lint:
    name: Static lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          uv-version: "0.11.8"

      - name: Run lint (strict mode)
        run: uv run --python 3.12 tests/lint.py --strict --json | tee lint-output.json
        # --strict: treats WARN as FAIL in CI; any finding blocks the PR
        # --json: structured output for potential future annotations step

      - name: Run lint pytest suite
        run: PYTHONIOENCODING=utf-8 uv run --python 3.12 --with pytest --with pyyaml -m pytest tests/lint_test.py -q
        # Catches rule-logic regressions: must-catch and must-not-catch fixtures for every rule

      - name: Run BP24 classification verifier
        run: uv run --python 3.12 tests/check_bp24_classification.py
        # Exits nonzero if any on/off setter is missing its BP24 classification comment

      - name: Run C3 gate coverage verifier
        run: uv run --python 3.12 tests/check_c3_gate_coverage.py
        # Exits nonzero if any on/off setter that emits an attribute is missing the C3 idempotency gate

      - name: Run BP26 spec coverage verifier
        run: uv run --python 3.12 tests/check_bp26_spec_coverage.py
        # Exits nonzero if any safeIntArg command method is missing a Spock regression spec

      - name: Upload lint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint-output.json
          retention-days: 7
