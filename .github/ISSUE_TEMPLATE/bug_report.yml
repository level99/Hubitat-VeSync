# IMPORTANT: field `id` values in this form MUST match the parameter names used
# by LevoitDiagnosticsLib.groovy's buildIssueUrl() helper, AND match the convention
# already established on `main` (underscore-form: `driver`, `model_code`, etc.).
# Hyphenated IDs (`driver-name`, `model-code`) silently fail because GitHub renders
# the issue form from `main`'s template, not from the branch the link came from.
#
# The library assembles a pre-fill URL of the form:
#
#   https://github.com/level99/Hubitat-VeSync/issues/new?
#     template=bug_report.yml&
#     title=...&labels=...&
#     driver=...&driver_version=...&model_code=...&
#     hub_firmware=...&last_error=...&diagnostic_block=...
#
# Contract:
#   id: driver           ← library field "driver"
#   id: driver_version   ← library field "driver_version"
#   id: model_code       ← library field "model_code"
#   id: hub_firmware     ← library field "hub_firmware"
#   id: last_error       ← library field "last_error"
#   id: diagnostic_block ← library field "diagnostic_block"
#
# Do NOT rename these IDs without updating LevoitDiagnosticsLib.groovy's
# buildIssueUrl() simultaneously, or pre-filled issue links will break.

name: Bug report
description: Report a defect in an existing driver — wrong behavior, error in logs, attribute not updating, etc.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Filling out the fields below helps the maintainer reproduce and fix the issue faster.

        **Fastest path:** open the device page in Hubitat, click **captureDiagnostics**, then click the pre-filled GitHub issue link in the `diagnostics` attribute — it populates most fields below automatically.

        Before submitting:
        - Check the [migration guide](https://github.com/level99/Hubitat-VeSync/blob/main/docs/migration-from-niklas-upstream.md) if you just upgraded — most post-migration symptoms are covered there.
        - Search [existing issues](https://github.com/level99/Hubitat-VeSync/issues?q=is%3Aissue) for duplicates.
        - For general questions or "is this a bug?" uncertainty, the [Hubitat community thread](https://community.hubitat.com/t/release-levoit-air-purifiers-humidifiers-and-fans/163499) is faster.

  - type: input
    id: driver
    attributes:
      label: Affected driver
      description: Which driver shows the problem? (pre-filled by captureDiagnostics)
      placeholder: "Levoit Vital 200S Air Purifier"
    validations:
      required: true

  - type: input
    id: driver_version
    attributes:
      label: Driver version
      description: From the driver's History block or levoitManifest.json. (pre-filled by captureDiagnostics)
      placeholder: "2.4"
    validations:
      required: true

  - type: input
    id: model_code
    attributes:
      label: Device model code
      description: The exact model code of the affected hardware (visible in VeSync app device info, or on the device label). (pre-filled by captureDiagnostics)
      placeholder: "e.g. LAP-V201S-WUS, LEH-S601S-WUSR"
    validations:
      required: false

  - type: input
    id: hub_firmware
    attributes:
      label: Hubitat hub firmware version
      description: Hubitat → Settings → Hub Details → Platform Version. (pre-filled by captureDiagnostics)
      placeholder: "e.g. 2.3.8.140"
    validations:
      required: false

  - type: input
    id: last_error
    attributes:
      label: Last error message
      description: The most recent error from the driver logs. (pre-filled by captureDiagnostics)
      placeholder: "ERROR: No status returned from getPurifierStatus"
    validations:
      required: false

  - type: textarea
    id: diagnostic_block
    attributes:
      label: Diagnostic capture
      description: |
        Output from the **captureDiagnostics** command — paste the full markdown block here.
        To capture: open the device page → click captureDiagnostics → copy the diagnostics attribute value.
        (pre-filled automatically if you clicked the link from the diagnostics attribute)
      render: markdown
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: What were you doing when this happened?
      description: A sentence or two of context — what command or event triggered the bug, what you expected vs. what occurred.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps (if not obvious from context above)
      description: Numbered list. Be specific — "every time I trigger setSpeed('high') from a rule" is more useful than "sometimes the speed doesn't change."
      placeholder: |
        1. Set device mode to manual
        2. Call setSpeed("high") from Rule Machine
        3. Observe that speed attribute stays at "low"
    validations:
      required: false

  - type: textarea
    id: debug_log
    attributes:
      label: Debug log (if diagnostic capture above is not available)
      description: |
        How to capture:
        1. On the **VeSync Integration** parent device, set **Enable debug logging** to **true**, click **Save Preferences**.
        2. Trigger the bug.
        3. In Hubitat → **Logs**, copy the lines mentioning the affected device (and any error lines).
        4. Paste below.

        **Account credentials are auto-redacted** by the parent's `sanitize()` helper, so debug captures are safe to share without scrubbing.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: prereqs
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched [existing issues](https://github.com/level99/Hubitat-VeSync/issues?q=is%3Aissue) and didn't find a duplicate.
          required: true
        - label: I checked the [migration guide](https://github.com/level99/Hubitat-VeSync/blob/main/docs/migration-from-niklas-upstream.md) if this issue appeared after a v2.0 upgrade.
          required: true
        - label: My debug log above does not contain my real VeSync email or password (the auto-sanitize covers tokens/accountID, but please double-check the email field).
          required: true
